name: Release Obsidian plugin

on:
  push:
    tags:
      - '*' # Triggers on any tag push (e.g. 1.0.0)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css \
            "${{ steps.attest.outputs.bundle-path }}#attestation.jsonl"
